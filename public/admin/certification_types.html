<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Certification Types</title>
    <link rel="stylesheet" href="layout.css">
</head>

<body>

    <div class="sidebar">
        <h2>Admin</h2>
        <a href="QuanLyNongSanGiaMao/public/admin/dashboard.html">Dashboard</a>
        <a href="QuanLyNongSanGiaMao/public/admin/products.html">Products</a>
        <a href="QuanLyNongSanGiaMao/public/admin/producers.html">Producers</a>
        <a href="QuanLyNongSanGiaMao/public/admin/certification_types.html">Certification Types</a>
        <a href="QuanLyNongSanGiaMao/public/admin/certifications.html">Certifications</a>
        <a href="QuanLyNongSanGiaMao/public/admin/batch.html">Batch</a>
        <a href="QuanLyNongSanGiaMao/public/admin/qrcodes.html">QR Codes</a>
        <a href="QuanLyNongSanGiaMao/public/admin/scanlogs.html">Scan Logs</a>
    </div>

    <div class="main">

        <h1>Certification Types</h1>

        <div class="card">

            <div class="form-group">
                <label>ID</label>
                <input id="id">
            </div>

            <div class="form-group">
                <label>Name</label>
                <input id="name">
            </div>

            <button id="submitBtn" onclick="createType()">Create</button>
            <button id="cancelBtn" onclick="cancelEdit()" style="display:none; background:gray">Cancel</button>

        </div>

        <div class="card">

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="table"></tbody>
            </table>

        </div>

    </div>

    <script>

        let editingId = null

        async function load() {

            const data = await fetch("https://quanlynongsangiamao-backend.onrender.com/admin/api/cert-types").then(r => r.json())

            document.getElementById("table").innerHTML =
                data.map(t => `
        <tr>
            <td>${t.typeID}</td>
            <td>${t.typeName}</td>
            <td>
                <button onclick="editType(${t.typeID}, '${t.typeName}')">Edit</button>
                <button onclick="del(${t.typeID})" style="background:red">Delete</button>
            </td>
        </tr>
        `).join("")
        }

        async function createType() {

            const id = document.getElementById("id").value
            const name = document.getElementById("name").value

            if (editingId) {

                await fetch("https://quanlynongsangiamao-backend.onrender.com/admin/api/cert-types/" + editingId, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name })
                })

                editingId = null
                cancelEdit()
            }

            else {

                await fetch("https://quanlynongsangiamao-backend.onrender.com/admin/api/cert-types", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id, name })
                })
            }

            load()
        }

        async function del(id) {
            await fetch("https://quanlynongsangiamao-backend.onrender.com/admin/api/cert-types/" + id, { method: "DELETE" })
            load()
        }

        function editType(id, name) {

            editingId = id

            document.getElementById("id").value = id
            document.getElementById("name").value = name

            document.getElementById("id").disabled = true

            document.getElementById("submitBtn").innerText = "Update"
            document.getElementById("cancelBtn").style.display = "inline-block"
        }

        function cancelEdit() {

            editingId = null

            // reset form
            document.getElementById("id").value = ""
            document.getElementById("name").value = ""

            document.getElementById("id").disabled = false

            // reset UI
            document.getElementById("submitBtn").innerText = "Create"
            document.getElementById("cancelBtn").style.display = "none"
        }

        load()

    </script>

</body>

</html>
