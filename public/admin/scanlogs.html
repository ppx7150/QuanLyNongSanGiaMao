<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Scan Logs</title>

    <link rel="stylesheet" href="layout.css">

</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Admin</h2>
        <a href="QuanLyNongSanGiaMao/public/admin/dashboard.html">Dashboard</a>
        <a href="QuanLyNongSanGiaMao/public/admin/products.html">Products</a>
        <a href="QuanLyNongSanGiaMao/public/admin/producers.html">Producers</a>
        <a href="QuanLyNongSanGiaMao/public/admin/certification_types.html">Certification Types</a>
        <a href="QuanLyNongSanGiaMao/public/admin/certifications.html">Certifications</a>
        <a href="QuanLyNongSanGiaMao/public/admin/batch.html">Batch</a>
        <a href="QuanLyNongSanGiaMao/public/admin/qrcodes.html">QR Codes</a>
        <a href="QuanLyNongSanGiaMao/public/admin/scanlogs.html">Scan Logs</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h1>Scan Logs</h1>

        <!-- TABLE -->
        <div class="card">
            <h3>Scan History</h3>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>QR ID</th>
                        <th>Time</th>
                        <th>IP</th>
                        <th>Location</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="scanTable"></tbody>
            </table>
        </div>

    </div>

    <script>

        // LOAD DATA
        async function loadLogs() {

            const res = await fetch("https://quanlynongsangiamao-backend.onrender.com/admin/scanlogs")
            const data = await res.json()

            let html = ""

            data.forEach(s => {

                html += `
        <tr>
            <td>${s.sID}</td>
            <td>${s.qrID}</td>
            <td>${formatDate(s.sTime)}</td>
            <td>${s.IP || ""}</td>
            <td>${s.sLoc || ""}</td>
            <td>
                <button style="background:red"
                    onclick="deleteLog(${s.sID})">
                    Delete
                </button>
            </td>
        </tr>
        `
            })

            document.getElementById("scanTable").innerHTML = html
        }

        // FORMAT TIME
        function formatDate(date) {
            return new Date(date).toLocaleString("vi-VN", {
                timeZone: "UTC"
            })
        }

        // DELETE
        async function deleteLog(id) {

            if (!confirm("Xóa log này?")) return

            await fetch("https://quanlynongsangiamao-backend.onrender.com/admin/api/scanlogs/" + id, {
                method: "DELETE"
            })

            loadLogs()
        }

        // INIT
        loadLogs()

    </script>

</body>

</html>
